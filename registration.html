<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="css/registration.css" type="text/css">
    <script>
        function clearForm() {
            document.getElementById("registration-form").reset();
        }
    </script>
</head>
<body>
    <div class="header">
        <div class="collegelogo">
            <img src="images/logo modified.jpg" alt="College Logo">
        </div>
        <nav class="menu">
            <ul>
                <li><a href="eventschedule.html">Event Schedule</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="contact-us.html">Contact Us</a></li>
            </ul>
        </nav>
    </div>
    <div class="container">
        <h2>Event Registration Form</h2>
        <form id="registration-form" action="connect.php" method="post">
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" name="full_name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="college-name">College Name</label>
                <input type="text" id="college-name" name="college_name" placeholder="Enter your college name" required>
            </div>
            <div class="form-group">
                <label for="year">Year</label>
                <input type="number" id="year" name="year" min="1" max="5" placeholder="Enter year" required>
            </div>
            <div class="form-group">
                <label for="branch">Branch</label>
                <input type="text" id="branch" name="branch" placeholder="Enter your branch" required>
            </div>
            <div class="form-group">
                <label for="reg-number">Regd Number</label>
                <input type="text" id="reg-number" name="reg_number" placeholder="Enter your registration number" required>
            </div>
            <div class="form-group">
                <label for="registered-for">Registered For</label>
                <select id="registered-for" name="participation_for" required>
                    <option value="">Select</option>
                    <option value="singing">Singing</option>
                    <option value="dance">Dance</option>
                    <option value="hackathon">Hackathon</option>
                    <option value="art-exhibition">Art Exhibition</option>
                    <option value="stalls">Stalls</option>
                    <option value="sports">Sports</option>
                    <option value="cultural">Cultural</option>
                    <option value="technical">Technical</option>
                </select>
            </div>
            <div class="button-group">
                <div class="button-row">
                    <button type="submit">Register</button>
                    <button type="button" onclick="clearForm()">Clear Form</button>
                </div>
                <a href="index.html" class="home-button">Click to Home Page</a>
            </div>
        </form>
    </div>
</body>
</html>
